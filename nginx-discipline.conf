# Nginx configuration for twcdiscipline.kal-el.net
# The Discipline of The Wesleyan Church — VitePress static site
#
# Deploy to /etc/nginx/sites-available/twcdiscipline
# Then: ln -s /etc/nginx/sites-available/twcdiscipline /etc/nginx/sites-enabled/
# SSL: certbot --nginx -d twcdiscipline.kal-el.net

server {
    listen 80;
    server_name twcdiscipline.kal-el.net;
    root /var/www/discipline/dist;
    index index.html;

    # VitePress client-side routing — try .html for clean URLs
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(woff2|js|css|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
}
